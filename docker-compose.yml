services:
  gateway:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hagap}
      POSTGRES_USER: ${POSTGRES_USER:-hagap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OPENCODE_MODE: SERVER
      OPENCODE_SERVER_URL: http://opencode:4096
      WORKSPACE_BASE_DIR: /data/workspaces
    volumes:
      - workspace_data:/data/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - hagap-net

  opencode:
    image: node:22-slim
    command: >
      sh -c "npm install -g opencode && opencode serve --port 4096"
    ports:
      - "4096:4096"
    volumes:
      - workspace_data:/data/workspaces
    working_dir: /data/workspaces
    networks:
      - hagap-net

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hagap}
      POSTGRES_USER: ${POSTGRES_USER:-hagap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hagap} -d $${POSTGRES_DB:-hagap}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hagap-net

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hagap-net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - hagap-net

volumes:
  workspace_data:
  postgres_data:
  qdrant_data:

networks:
  hagap-net:
    driver: bridge
